<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="utf-8">
    <title>Packliste</title>
</head>

<body>
    <h1>DeineOnlinePackListe</h1>
    <p>Diese Website ist ein Vorläufer der echten Website.</p>

    <form>
        <p>Reiseziel: <input type="text" id="ziel"></p>
        <p>Reisedauer: <input type="number" id="tage"></p>
        <button type="button" onclick="erstelleListe()">Packliste erstellen</button>
    </form>

    <div id="liste"></div>

    <script>
        function erstelleListe() {
            let ziel = document.getElementById("ziel").value;
            let tage = document.getElementById("tage").value;
            let sachen = ["Handy", "Ladekabel", "Powerbank", "Ausweis", "Geldbeutel", "Schlüssel", "Zahnbürste", "Unterwäsche", "Socken", "Wasserflasche"];
            if (tage > 7) {
            sachen.push("Waschmittel");
            }
            if (tage > 9) {
            sachen.push("Unterwäsche & Socken für ca. " + tage + " Tage", "Reiseapotheke + Medikamente mit Reserve", "Reiseadapter", "Zweites Ladekabel", "Flip-Flops", "Ohrstöpsel", "Dokumentenkopien");
            }
            let listeHTML = "";
            for (let sache of sachen) {
                listeHTML = listeHTML + "<li>" + sache + "</li>";
            }

            document.getElementById("liste").innerHTML = "Deine Packliste für " + ziel + ", " + tage + " Tage:" + "<ul>" + listeHTML + "</ul>";
        }
    </script>
</body>

</html>
