<!DOCTYPE html>
<html lang="de">

<head>

    <style>
    * {

    html, body {

    body {

    header {

        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 40px 20px 70px 20px;
        position: relative;
        overflow: hidden;
    }

    header h1 {
        margin: 0;
        font-size: 3em;
        color: white;
        text-shadow: 0 2px 12px rgba(0, 0, 0, 0.2);
    }

    @media (max-width: 500px) {
        header h1 {

        }

        }
    }

    header p {
        margin: 12px 0 0 0;
        color: rgba(255, 255, 255, 0.9);
        font-size: 1.2em;
    }

    header .wave {
        position: absolute;
        bottom: -1px;
        left: 0;
        width: 100%;
        height: 60px;
        display: block;
    }

    .container {
        max-width: 950px;
        margin: -40px auto 0 auto;
        padding: 0 20px;
        position: relative;
    }

    form {
        background: #ffffff;
        border-radius: 20px;
        padding: 24px;
        border-top: 6px solid #e07a5f;
        box-shadow: 0 10px 30px rgba(61, 64, 91, 0.15);
        transition: transform 0.3s ease, box-shadow 0.3s ease;
        max-width: 600px;
        margin: 0 auto;
    }

    form:hover {
        transform: translateY(-4px);
        box-shadow: 0 16px 40px rgba(61, 64, 91, 0.2);
    }

    .stat-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
        gap: 10px;
        margin-top: 10px;
    }

    .stat-chip {
        background: #f4f1de;
        border: 1px solid #e9e5c8;
        border-left: 4px solid #81b29a;
        border-radius: 12px;
        padding: 10px 12px;
        font-size: 0.9em;
        color: #3d405b;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .stat-chip:hover {
        transform: translateY(-2px);
        box-shadow: 0 6px 16px rgba(61, 64, 91, 0.15);
    }

    .stat-chip strong {
        display: block;
        color: #e07a5f;
        font-size: 0.75em;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        margin-bottom: 4px;
    }

    form p {
        margin: 14px 0;
        color: #3d405b;
    }

    input,
    select {
        padding: 8px 10px;
        border-radius: 8px;
        border: 1px solid #d8d4b8;
        background: #fbfaf1;
        color: #3d405b;
    }

    input[type="text"],
    input[type="number"],
    select {
        width: 300px;
        max-width: 100%;
    }

    select {
        appearance: none;
        -webkit-appearance: none;
        -moz-appearance: none;
        background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='12' height='8'><path d='M0 0 L6 8 L12 0 Z' fill='%233d405b'/></svg>");
        background-repeat: no-repeat;
        background-position: right 12px center;
        padding-right: 32px;
    }

    input[type="checkbox"] {
        accent-color: #e07a5f;
        width: 18px;
        height: 18px;
        transition: transform 0.15s ease;
    }

    input[type="checkbox"]:checked {
        transform: scale(1.2);
    }

    input:focus,
    select:focus {
        outline: none;
        border-color: #e07a5f;
        box-shadow: 0 0 0 3px rgba(224, 122, 95, 0.2);
    }

    button {
        background: #e07a5f;
        color: white;
        border: none;
        padding: 12px 24px;
        border-radius: 999px;
        cursor: pointer;
        font-size: 1em;
        font-weight: bold;
        box-shadow: 0 6px 16px rgba(224, 122, 95, 0.4);
        transition: background-color 0.2s, transform 0.2s, box-shadow 0.2s;

    form button {

        padding: 16px 24px;
        font-size: 1.1em;
        margin-top: 8px;
    }

    button:hover {
        background-color: #c65f45;
        box-shadow: 0 8px 22px rgba(224, 122, 95, 0.5);

        margin-top: 16px;

        color: #3d405b;
        border: 1px solid #d8d4b8;
        box-shadow: none;
        font-size: 0.9em;
        padding: 8px 16px;

    button.sekundaer:hover {
        background: #f4f1de;
        box-shadow: 0 4px 12px rgba(61, 64, 91, 0.1);
        transform: translateY(-1px);

    @media print {
        header, form, .export-buttons, #wetter {

        }

        body {
            background: white;
        }

        #liste, #laenderinfo {
            box-shadow: none;
            border: 1px solid #ccc;
        }

        .container {
            margin-top: 0;
        }

    #wetter {
        margin-top: 16px;
        font-weight: bold;
        color: #3d5a80;
    }

    #laenderinfo {
        margin-top: 8px;
        color: #3d5a80;
    }

    #liste {
        background: #ffffff;
        border-radius: 20px;
        padding: 20px 24px;
        margin-top: 20px;
        border-top: 6px solid #81b29a;
        box-shadow: 0 10px 30px rgba(61, 64, 91, 0.15);

    #liste h3:first-of-type {

    #liste ul {

        padding: 0;

    #liste li {

    #liste a {

        color: #e07a5f;
        font-weight: bold;
    }

    #zaehler {

        margin-top: 10px;
        color: #3d5a80;
    }

    .fortschritt-aussen {

        background: #f0ede0;
        border-radius: 999px;
        margin-top: 8px;

    .fortschritt-innen {
        height: 100%;
        background: linear-gradient(90deg, #81b29a, #e07a5f);
        border-radius: 999px;
        transition: width 0.3s ease;
    }
    </style>
</head>

<body>
    <header>
        <h1>🎒 DeineOnlinePackListe</h1>

    <div class="container">

    <div class="export-buttons">

        <button type="button" class="sekundaer" onclick="merkeEingaben()">💾 Eingaben merken</button>
    </div>
    </div>

    <script>
        let generation = 0;

        function erstelleListe() {
            generation = generation + 1;
            let meineGeneration = generation;

            let ziel = document.getElementById("ziel").value;
            let tage = document.getElementById("tage").value;
            let art = document.getElementById("art").value;

            if (!/^[A-Za-zÀ-ÿ\s'.-]+$/.test(ziel)) {
                alert("Bitte beim Reiseziel nur Buchstaben eingeben.");
                return;
            }

            if (!tage || Number(tage) <= 0) {
                alert("Bitte eine gültige Reisedauer (mindestens 1 Tag) eingeben.");
                return;
            }

            let link = "https://www.google.com/search?q=Einreisebestimmungen+Impfungen+" + ziel;
            let linkWetter = "https://www.google.com/search?q=Wetter+" + ziel;
            let linkSpots = "https://www.google.com/search?q=Sehenswürdigkeiten+Öffnungszeiten+" + ziel;

            let bekannteSpots = {

        async function zeigeLaenderInfo(ziel, meineGeneration) {
            let laenderDiv = document.getElementById("laenderinfo");
            let info = laenderInfo[ziel.toLowerCase()];

            if (!info) {
                laenderDiv.innerHTML = "";
                return;
            }

            let staedteHTML = "";
            for (let stadt of info.groessteStaedte) {
                let stadtLink = "https://www.google.com/search?q=Sehenswürdigkeiten+Öffnungszeiten+" + stadt;
                staedteHTML = staedteHTML + '<a href="' + stadtLink + '" target="_blank">' + stadt + "</a>, ";
            }
            staedteHTML = staedteHTML.slice(0, -2);

            let basisHTML = '<p style="grid-column: 1 / -1; margin: 0 0 4px 0; font-size: 0.8em; opacity: 0.75;">ℹ️ Länderinfos sind allgemeine Richtwerte, keine geprüften Fakten – bei Einreise/Impfungen bitte offizielle Quellen prüfen (Link unten).</p><div class="stat-grid">'
                + '<div class="stat-chip"><strong>🌐 Hauptstadt</strong>' + info.hauptstadt + '</div>'
                + '<div class="stat-chip"><strong>💶 Währung</strong>' + info.waehrungName + ' (' + info.waehrungCode + ')</div>'
                + '<div class="stat-chip"><strong>🔌 Steckdose</strong>' + info.steckdose + '</div>'
                + '<div class="stat-chip"><strong>💳 Bezahlen</strong>' + info.zahlung + '</div>'
                + '<div class="stat-chip"><strong>💰 Preisniveau (Hotel/Essen)</strong>' + info.preisniveau + '</div>'
                + '<div class="stat-chip"><strong>🛂 Einreise</strong>' + info.einreise + '</div>'
                + '<div class="stat-chip"><strong>☀️ Beste Reisezeit</strong>' + info.besteReisezeit + '</div>'
                + '<div class="stat-chip"><strong>🗣️ Sprache</strong>' + info.sprache + '</div>'
                + '<div class="stat-chip"><strong>🚨 Notruf</strong>' + info.notruf + '</div>'
                + '<div class="stat-chip"><strong>🕒 Zeitzone</strong>' + info.zeitzone + '</div>'
                + '<div class="stat-chip"><strong>📶 SIM-Karte</strong>' + info.sim + '</div>'
                + '<div class="stat-chip"><strong>🏙️ Größte Städte</strong>' + staedteHTML + '</div>';

            if (info.waehrungCode === "EUR") {
                laenderDiv.innerHTML = basisHTML + '<div class="stat-chip"><strong>💱 Wechselkurs</strong>Gleiche Währung wie in Deutschland</div></div>';
                return;
            }

            laenderDiv.innerHTML = basisHTML + '<div class="stat-chip"><strong>💱 Wechselkurs</strong>wird geladen...</div></div>';

            try {
                let kursResponse = await fetch("https://api.frankfurter.dev/v1/latest?from=EUR&to=" + info.waehrungCode);
                let kursData = await kursResponse.json();
                let kurs = Math.round(kursData.rates[info.waehrungCode] * 100) / 100;
                if (meineGeneration !== generation) {
                    return;
                }
                laenderDiv.innerHTML = basisHTML + '<div class="stat-chip"><strong>💱 Wechselkurs</strong>1 EUR ≈ ' + kurs + ' ' + info.waehrungCode + '</div></div>';
            } catch (fehler) {
                if (meineGeneration !== generation) {
                    return;
                }
                laenderDiv.innerHTML = basisHTML + '<div class="stat-chip"><strong>💱 Wechselkurs</strong>aktuell nicht verfügbar</div></div>';
            }
        }

        async function zeigeWetter(ziel, meineGeneration) {
            let wetterDiv = document.getElementById("wetter");
            wetterDiv.innerHTML = "Wetter wird geladen...";
            try {
                let geoResponse = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + encodeURIComponent(ziel) + "&count=1&language=de&format=json");
                let geoData = await geoResponse.json();

                if (meineGeneration !== generation) {
                    return;
                }

                if (!geoData.results || geoData.results.length === 0) {
                    wetterDiv.innerHTML = "Kein Wetter gefunden für " + ziel + ".";
                    return;
                }

                let lat = geoData.results[0].latitude;
                let lon = geoData.results[0].longitude;

                let wetterResponse = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true");
                let wetterData = await wetterResponse.json();
                let temp = wetterData.current_weather.temperature;

                if (meineGeneration !== generation) {
                    return;
                }

                wetterDiv.innerHTML = "🌤️ Aktuelles Wetter in " + ziel + ": " + Math.round(temp * 10) / 10 + "°C";

                let klimaSachen = [];
                if (temp < 5) {
                    klimaSachen = ["Warme Winterjacke", "Handschuhe", "Mütze", "Schal", "Thermounterwäsche"];
                } else if (temp < 15) {
                    klimaSachen = ["Warme Jacke", "Pullover"];
                } else if (temp > 28) {
                    klimaSachen = ["Extra Sonnencreme", "Kühlendes Gesichtsspray", "Zusätzliche Trinkflasche"];
                }

                if (klimaSachen.length > 0) {
                    let klimaHTML = "<h3>🌡️ Passend zu " + Math.round(temp) + "°C in " + ziel + "</h3><ul>";
                    for (let sache of klimaSachen) {
                        klimaHTML = klimaHTML + '<li><input type="checkbox" data-kategorie="Kleidung" onclick="zaehle()"> ' + sache + "</li>";
                    }
                    klimaHTML = klimaHTML + "</ul>";
                    document.getElementById("liste").insertAdjacentHTML("beforeend", klimaHTML);
                    zaehle();
                }
            } catch (fehler) {
                wetterDiv.innerHTML = "Wetter konnte nicht geladen werden.";
            }
        }

        let kategorieGewichte = {
    "Dokumente & Wertsachen": 50,
    "Technik": 250,
    "Hygiene & Gesundheit": 100,
    "Kleidung": 200,
    "Ausrüstung & Sonstiges": 400
};

function zaehle() {
    let boxen = document.querySelectorAll("#liste input[type='checkbox']");
    let gepackt = 0;
    let gewichtGramm = 0;
    for (let box of boxen) {
        if (box.checked) {
            gepackt = gepackt + 1;
            gewichtGramm = gewichtGramm + (kategorieGewichte[box.dataset.kategorie] || 150);
        }
    }
    let prozent = boxen.length > 0 ? Math.round((gepackt / boxen.length) * 100) : 0;
    let gewichtKg = Math.round(gewichtGramm / 100) / 10;
    document.getElementById("zaehler").innerHTML = gepackt + " von " + boxen.length + " gepackt (" + prozent + "%)"
        + '<div class="fortschritt-aussen"><div class="fortschritt-innen" style="width: ' + prozent + '%;"></div></div>'
        + '<p style="font-size: 0.85em; opacity: 0.8; margin: 8px 0 0 0;">🎒 Geschätztes Gepäckgewicht: ca. ' + gewichtKg + ' kg (grober Richtwert pro Kategorie, kein echtes Gewicht)</p>';
}

function druckeListe() {
    window.print();
}

function exportiereCSV() {
    let boxen = document.querySelectorAll("#liste input[type='checkbox']");
    let zeilen = ["Kategorie,Gegenstand,Abgehakt"];
    for (let box of boxen) {
        let text = box.parentElement.textContent.trim();
        let kategorie = box.dataset.kategorie || "Sonstiges";
        let abgehakt = box.checked ? "ja" : "nein";
        zeilen.push('"' + kategorie + '","' + text + '","' + abgehakt + '"');
    }
    let csvInhalt = zeilen.join("\n");
    let blob = new Blob([csvInhalt], { type: "text/csv;charset=utf-8;" });
    let url = URL.createObjectURL(blob);
    let link = document.createElement("a");
    link.href = url;
    link.download = "packliste.csv";
    link.click();
    URL.revokeObjectURL(url);
}

function merkeEingaben() {
    localStorage.setItem("packlisteZiel", document.getElementById("ziel").value);
    localStorage.setItem("packlisteTage", document.getElementById("tage").value);
    localStorage.setItem("packlisteArt", document.getElementById("art").value);
    alert("Eingaben gemerkt! Beim nächsten Besuch werden sie automatisch ausgefüllt.");
}

window.addEventListener("DOMContentLoaded", function () {
    let gespeicherterZiel = localStorage.getItem("packlisteZiel");
    let gespeicherteTage = localStorage.getItem("packlisteTage");
    let gespeicherterArt = localStorage.getItem("packlisteArt");
    if (gespeicherterZiel) {
        document.getElementById("ziel").value = gespeicherterZiel;
    }
    if (gespeicherteTage) {
        document.getElementById("tage").value = gespeicherteTage;
    }
    if (gespeicherterArt) {
        document.getElementById("art").value = gespeicherterArt;
    }
});
